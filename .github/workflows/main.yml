name: Telegram News Bot

on:
  workflow_dispatch: # فقط با تریگر دستی یا API (از طرف cron-job.org) اجرا می‌شود

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TARGET_CHANNEL: ${{ secrets.TARGET_CHANNEL }}
        run: python main.py

      - name: Commit and Push History
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          touch news_exclusive.json
          git add news_exclusive.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update news history" && git push)
