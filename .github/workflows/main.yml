name: News Auto Forwarder

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 * * * *'
    
jobs:
  run-aggregator:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # کش کردن خودکار کتابخانه‌های پایتون

      - name: Cache HuggingFace Models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-model-minilm
          restore-keys: |
            ${{ runner.os }}-hf-model-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TARGET_CHANNEL: ${{ secrets.TARGET_CHANNEL }}
        run: python main.py

      - name: Commit History
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.pkl 
          git commit -m "Auto-update AI semantics history [skip ci]" || echo "No new news, nothing to commit"
          git pull --rebase origin main
          git push
